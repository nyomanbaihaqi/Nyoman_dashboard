<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- viewport-fit=cover lets the layout reach under the iOS home indicator;
         no maximum-scale, so pinch-zoom stays available (WCAG 1.4.4). -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Workspace OS</title>
    <meta name="description" content="Personal assistant, project manager, and AI engineering workspace." />
    <meta name="theme-color" content="#ffffff" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/css/tokens.css" />
    <link rel="stylesheet" href="assets/css/app.css" />
  </head>
  <body>
    <div id="app"></div>

    <!-- Load order matters: config → util → icons → i18n → format →
         seed → store → ui → shell → page. Each depends on the ones above. -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/icons.js"></script>
    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/format.js"></script>
    <script src="assets/js/seed.js"></script>
    <script src="assets/js/store.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/shell.js"></script>
    <script src="assets/js/pages/home.js"></script>
  </body>
</html>
